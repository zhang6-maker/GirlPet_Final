<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' http://localhost:* http://127.0.0.1:* blob:; script-src 'self' 'unsafe-inline' 'unsafe-eval' http://localhost:* http://127.0.0.1:*; connect-src *; media-src blob: 'self' http://127.0.0.1:* http://localhost:*;">

    <meta charset="UTF-8">
    <title>寻慧 - 桌面小精灵</title>
    <style>
        * { margin: 0; padding: 0; user-select: none; }
        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: transparent;
        }
        #girl {
            position: absolute;
            width: 150px;
            height: 150px;
            cursor: pointer;
            transition: left 0.05s linear, top 0.05s linear;
        }
        #bubble {
            position: absolute;
            background: white;
            border-radius: 20px;
            padding: 8px 15px;
            border: 1px solid #ccc;
            box-shadow: 2px 2px 8px rgba(0,0,0,0.2);
            display: none;
            max-width: 280px;
            max-height: 120px;
            overflow-y: auto;
            word-wrap: break-word;
            white-space: normal;
            font-size: 14px;
            font-family: 'Segoe UI', 'Noto Sans CJK SC', sans-serif;
            z-index: 100;
            pointer-events: auto;
        }
        /* 游戏面板样式已不再使用，保留以防其他用途，但面板本身已移除 */
    </style>
</head>
<body>
    <img id="girl" src="images/idle.gif" alt="寻慧">
    <div id="bubble"></div>

    <script src="libs/jszip.min.js"></script>

    <script src="libs/pptxgen.min.js"></script>

    <script src="src/renderer/deps.js"></script>
    <script src="src/renderer/settingsStore.js"></script>
    <script src="src/renderer/config.js"></script>
    <script src="src/renderer/storage.js"></script>
    <!-- ✅ 新增提醒模块 -->
    <script src="src/renderer/reminders.js"></script>

    <script src="src/renderer/ollamaChecker.js"></script>
    
    <script src="src/renderer/tts.js"></script>
    <script src="src/renderer/ui.js"></script>
    <script src="src/renderer/settingsPanel.js"></script>
    <script src="src/renderer/diaryBook.js"></script>
    <script src="src/renderer/state.js"></script>
    <script src="src/renderer/actions.js"></script>
    <script src="src/renderer/chat.js"></script>
    <script src="src/renderer/game.js"></script>
    <script src="src/renderer/voice.js"></script>
    <script src="src/renderer/drag.js"></script>
    <script src="src/renderer/index.js"></script>
    
    
    <!-- 可拖拽的食物图标（初始隐藏） -->
    <div id="foodIcon" draggable="true" style="position: fixed; width: 50px; height: 50px; background: #ff9966; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 30px; cursor: grab; z-index: 10001; box-shadow: 0 2px 8px rgba(0,0,0,0.2);">🍎</div>
    <!-- 隐身/显示按钮 -->
    <div id="toggleVisibilityBtn" style="
        position: fixed;
        bottom: 5px;
        right: 5px;
        width: 36px;
        height: 36px;
        background: rgba(255,255,255,0.7);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        cursor: pointer;
        z-index: 10004;
        box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        user-select: none;
    " title="隐藏/显示寻慧">👁️</div>
</body>
</html>
